services:
  app:
    build:
      context: .
      target: dev
    working_dir: /app
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: 3000
      WATCHPACK_POLLING: "true"
      NODE_OPTIONS: --inspect=0.0.0.0:9229
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "npm ci &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  node_modules:
